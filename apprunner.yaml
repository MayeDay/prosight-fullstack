version: 1.0
runtime: NODEJS_20
build:
  commands:
    build:
      - cd prosight-server && npm install && npx prisma generate
run:
  command: sh -c "cd prosight-server && npx prisma db push --accept-data-loss && node server.js"
  network:
    port: 8080
    env: PORT
  env:
    - name: NODE_ENV
      value: "production"
    - name: JWT_SECRET
      value: "prosight-super-secret-key-change-this-in-production-min-32-chars"
    - name: JWT_ISSUER
      value: "ProSightAPI"
    - name: JWT_AUDIENCE
      value: "ProSightClient"
    - name: DATABASE_URL
      value: "sqlserver://YOUR_RDS_ENDPOINT:1433;database=ProSightDb;user=sa;password=YOUR_PASSWORD;trustServerCertificate=true"
