version: 1.0
runtime: nodejs22
build:
  commands:
    build:
      - cd prosight-server && npm install && npx prisma generate && npx prisma db push --accept-data-loss
  env:
    - name: DATABASE_URL
      value: 'postgresql://neondb_owner:npg_hf5WRqDona1S@ep-empty-feather-ams6t7mu-pooler.c-5.us-east-1.aws.neon.tech/neondb?sslmode=require'
run:
